<!doctype html>
<html lang="ko"><head><meta charset="UTF-8">
<style>
  @font-face{font-family:'Pretendard';src:url('PretendardVariable.woff2') format('woff2-variations');font-weight:100 900;font-display:block}
  @font-face{font-family:'Inter';src:url('InterVariable.woff2') format('woff2-variations');font-weight:100 900;font-display:block}
  html,body{margin:0;padding:0}
  .stage{
    position:relative;width:1932px;height:828px;background:#000;
    background-image:radial-gradient(circle, rgba(255,255,255,.06) 1.4px, transparent 1.7px);
    background-size:30px 30px;background-position:center;overflow:hidden;
    font-family:'Inter','Pretendard',sans-serif;
  }
  .ball{position:absolute;border-radius:50%;background:#fff}
  .ball .hi{position:absolute;left:22%;top:22%;width:21%;height:21%;border-radius:50%;background:#000}
  .ghost{position:absolute;border-radius:50%;background:#fff}

  /* 좌측 HUD 모티프 */
  .hud{position:absolute;left:120px;top:78px;font-family:'Inter';font-weight:700;font-size:30px;letter-spacing:.12em;color:#fff;display:flex;gap:18px;align-items:center}
  .hud .dim{color:rgba(255,255,255,.4)}

  /* EXIT 탈출구 (게임 내 탈출구 재현) */
  .exit{position:absolute;left:356px;top:150px;width:150px;height:168px;border:3px dashed rgba(255,255,255,.85);border-radius:6px}
  .exit .label{position:absolute;left:0;top:-40px;width:100%;text-align:center;font-family:'Inter';font-weight:800;font-size:26px;letter-spacing:.28em;color:#fff}
  .exit .cell{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:42px;height:42px;border:3px solid #fff}

  /* 우측 텍스트 블록 */
  .copy{position:absolute;left:792px;top:0;width:1020px;height:828px;display:flex;flex-direction:column;justify-content:center;gap:0}
  .eyebrow{font-family:'Inter';font-weight:700;font-size:30px;letter-spacing:.42em;color:rgba(255,255,255,.5);margin-bottom:30px}
  .title{font-family:'Pretendard';font-weight:900;font-size:172px;line-height:.96;letter-spacing:-.015em;color:#fff}
  .sub{font-family:'Pretendard';font-weight:600;font-size:46px;line-height:1.35;color:rgba(255,255,255,.82);margin-top:34px}
  .chips{display:flex;gap:16px;margin-top:48px}
  .chip{border:1.5px solid rgba(255,255,255,.28);border-radius:999px;padding:13px 28px;font-size:28px;font-weight:600;color:rgba(255,255,255,.88)}
  .chip.ko{font-family:'Pretendard'}
  .chip.en{font-family:'Inter';letter-spacing:.06em}
</style></head>
<body>
  <div class="stage">
    <!-- 좌측: 게임 장면 -->
    <div class="hud"><span>STAGE 14</span><span class="dim">/ 20</span><span style="margin-left:14px">&#9670; 23</span></div>

    <div class="exit"><div class="label">EXIT</div><div class="cell"></div></div>

    <!-- 바운스 궤적: 좌하 → 우상으로 EXIT를 향해 도약 -->
    <div class="ghost" style="width:60px;height:60px;left:250px;top:678px;opacity:.13"></div>
    <div class="ghost" style="width:118px;height:118px;left:286px;top:556px;opacity:.26"></div>
    <div class="ball" style="width:236px;height:236px;left:344px;top:398px"><div class="hi"></div></div>

    <!-- 우측: 카피 -->
    <div class="copy">
      <div class="eyebrow">THE LAST PIXEL</div>
      <div class="title">탱탱볼해금</div>
      <div class="sub">꺼져가는 게임기 속, 마지막 픽셀의 탈출</div>
      <div class="chips">
        <span class="chip ko">원터치 점프</span>
        <span class="chip en">20 STAGES</span>
        <span class="chip ko">흑백 미니멀 액션</span>
      </div>
    </div>
  </div>
</body></html>
